<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gesture Particle System</title>

  <link rel="stylesheet" href="style.css">

  <script type="module" src="https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>

  <video id="inputVideo" autoplay playsinline></video>

  <div id="ui">
    <h2>Particle Controls</h2>

    <label>Color</label>
    <input type="color" id="colorPicker" value="#00ffff">

    <label>Pattern</label>
    <select id="patternSelect">
      <option value="sphere">Sphere</option>
      <option value="wave">Wave</option>
      <option value="galaxy">Galaxy</option>
    </select>

    <button id="fullscreenBtn">Fullscreen</button>
  </div>

  <canvas id="webgl"></canvas>

  <script type="module" src="main.js"></script>

</body>
</html>
